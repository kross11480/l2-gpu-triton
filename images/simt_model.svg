<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="white"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="600" fill="#1a1a1a">
    SIMT execution model: grid → program → warp → thread
  </text>

  <!-- ──────────── Row 1 — GRID OF PROGRAMS ──────────── -->
  <text x="40" y="92" font-size="14" font-weight="600" fill="#1a1a1a">grid:</text>

  <g transform="translate(120, 68)">
    <rect width="80" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="40" y="29" text-anchor="middle" font-size="13" fill="#1a1a1a">pid=0</text>

    <rect x="90" width="80" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="130" y="29" text-anchor="middle" font-size="13" fill="#1a1a1a">pid=1</text>

    <rect x="180" width="80" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="220" y="29" text-anchor="middle" font-size="13" fill="#1a1a1a">pid=2</text>

    <text x="305" y="32" text-anchor="middle" font-size="22" fill="#555">⋯</text>

    <rect x="350" width="100" height="44" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="400" y="29" text-anchor="middle" font-size="13" fill="#1a1a1a">pid=G-1</text>

    <!-- Highlight pid=0 to indicate the next zoom-in -->
    <rect width="80" height="44" rx="4" fill="none" stroke="#f57c00" stroke-width="2.5" stroke-dasharray="4,2"/>
  </g>

  <text x="450" y="140" text-anchor="middle" font-size="12" font-style="italic" fill="#666">
    G independent programs scheduled across the GPU's SMs
  </text>

  <!-- Arrow row1 → row2 -->
  <line x1="160" y1="125" x2="240" y2="195" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="252" y="170" font-size="11" font-style="italic" fill="#666">zoom into one program</text>

  <!-- ──────────── Row 2 — ONE PROGRAM WITH 4 WARPS ──────────── -->
  <text x="40" y="232" font-size="14" font-weight="600" fill="#1a1a1a">one program:</text>

  <g transform="translate(180, 205)">
    <rect width="560" height="60" rx="4" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>

    <rect x="10" y="10" width="130" height="40" rx="3" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
    <text x="75" y="35" text-anchor="middle" font-size="13" fill="#1a1a1a">Warp 0</text>

    <rect x="145" y="10" width="130" height="40" rx="3" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
    <text x="210" y="35" text-anchor="middle" font-size="13" fill="#1a1a1a">Warp 1</text>

    <rect x="280" y="10" width="130" height="40" rx="3" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
    <text x="345" y="35" text-anchor="middle" font-size="13" fill="#1a1a1a">Warp 2</text>

    <rect x="415" y="10" width="130" height="40" rx="3" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
    <text x="480" y="35" text-anchor="middle" font-size="13" fill="#1a1a1a">Warp 3</text>

    <!-- Highlight Warp 0 -->
    <rect x="10" y="10" width="130" height="40" rx="3" fill="none" stroke="#c62828" stroke-width="2.5" stroke-dasharray="4,2"/>
  </g>

  <text x="460" y="285" text-anchor="middle" font-size="12" font-style="italic" fill="#666">
    num_warps × 32 threads per program  (here 4 × 32 = 128)
  </text>

  <!-- Arrow row2 → row3 -->
  <line x1="255" y1="270" x2="270" y2="345" stroke="#c62828" stroke-width="2" marker-end="url(#arrowHead)"/>
  <text x="282" y="315" font-size="11" font-style="italic" fill="#666">zoom into one warp</text>

  <!-- ──────────── Row 3 — ONE WARP WITH 32 THREADS ──────────── -->
  <text x="40" y="382" font-size="14" font-weight="600" fill="#1a1a1a">one warp:</text>

  <g transform="translate(170, 355)">
    <rect width="660" height="60" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>

    <!-- First 8 threads -->
    <g font-size="11" fill="#1a1a1a" text-anchor="middle">
      <rect x="10"  y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="29"  y="35">T0</text>
      <rect x="52"  y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="71"  y="35">T1</text>
      <rect x="94"  y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="113" y="35">T2</text>
      <rect x="136" y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="155" y="35">T3</text>
      <rect x="178" y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="197" y="35">T4</text>
      <rect x="220" y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="239" y="35">T5</text>
      <rect x="262" y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="281" y="35">T6</text>
      <rect x="304" y="14" width="38" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="323" y="35">T7</text>
    </g>

    <text x="370" y="38" text-anchor="middle" font-size="22" fill="#555">⋯</text>

    <!-- Last 4 threads -->
    <g font-size="11" fill="#1a1a1a" text-anchor="middle">
      <rect x="420" y="14" width="54" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="447" y="35">T28</text>
      <rect x="478" y="14" width="54" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="505" y="35">T29</text>
      <rect x="536" y="14" width="54" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="563" y="35">T30</text>
      <rect x="594" y="14" width="54" height="32" rx="2" fill="#fafafa" stroke="#757575"/>
      <text x="621" y="35">T31</text>
    </g>
  </g>

  <text x="500" y="435" text-anchor="middle" font-size="13" font-style="italic" fill="#444">
    32 threads (“lanes”) all execute the same instruction in lockstep
  </text>
  <text x="500" y="453" text-anchor="middle" font-size="12" font-style="italic" fill="#777">
    Single Instruction, Multiple Threads (SIMT)
  </text>

  <!-- Legend -->
  <g transform="translate(40, 490)">
    <rect width="18" height="14" rx="2" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="26" y="11" font-size="11" fill="#444">program (one kernel launch instance)</text>

    <rect x="280" width="18" height="14" rx="2" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
    <text x="306" y="11" font-size="11" fill="#444">warp (32 lockstep threads)</text>

    <rect x="510" width="18" height="14" rx="2" fill="#fafafa" stroke="#757575" stroke-width="1"/>
    <text x="536" y="11" font-size="11" fill="#444">thread / lane</text>
  </g>
</svg>
